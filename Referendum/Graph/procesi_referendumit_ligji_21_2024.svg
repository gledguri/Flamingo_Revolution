<svg width="100%" viewBox="0 0 680 1060" role="img" xmlns="http://www.w3.org/2000/svg" style="font-family:'Anthropic Sans', -apple-system, 'system-ui', 'Segoe UI', sans-serif">
<title>Procesi i referendumit shfuqizues për ligjin 21/2024</title>
<desc>Diagram me tetë hapa kronologjikë nga grupi nismëtar deri te rezultati, me kutinë e pragut real prej rreth 560 mijë votash dhe një panel anësor me dy mësime praktike nga historia.</desc>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<!-- Legend -->
<rect x="50" y="30" width="12" height="12" rx="3" fill="rgb(225,245,238)" stroke="rgb(15,110,86)"/>
<text x="70" y="36" dominant-baseline="central" fill="rgb(82,81,78)" font-size="12">Qytetarët</text>
<rect x="170" y="30" width="12" height="12" rx="3" fill="rgb(238,237,254)" stroke="rgb(83,74,183)"/>
<text x="190" y="36" dominant-baseline="central" fill="rgb(82,81,78)" font-size="12">Institucionet</text>
<rect x="300" y="30" width="12" height="12" rx="3" fill="rgb(250,236,231)" stroke="rgb(153,60,29)"/>
<text x="320" y="36" dominant-baseline="central" fill="rgb(82,81,78)" font-size="12">Votimi</text>

<!-- Step 1: y=80, h=56 -->
<g>
  <rect x="50" y="80" width="310" height="56" rx="8" fill="rgb(225,245,238)" stroke="rgb(15,110,86)" stroke-width="0.5"/>
  <text x="205" y="98" text-anchor="middle" dominant-baseline="central" fill="rgb(8,80,65)" font-size="14" font-weight="500">1. Grupi nismëtar</text>
  <text x="205" y="118" text-anchor="middle" dominant-baseline="central" fill="rgb(15,110,86)" font-size="12">Të paktën 12 zgjedhës të regjistruar</text>
</g>
<line x1="205" y1="138" x2="205" y2="172" marker-end="url(#arrow)" fill="none" stroke="rgb(137,135,129)" stroke-width="1.5"/>

<!-- Step 2: y=176, h=56 -->
<g>
  <rect x="50" y="176" width="310" height="56" rx="8" fill="rgb(225,245,238)" stroke="rgb(15,110,86)" stroke-width="0.5"/>
  <text x="205" y="194" text-anchor="middle" dominant-baseline="central" fill="rgb(8,80,65)" font-size="14" font-weight="500">2. Depozitimi në KQZ</text>
  <text x="205" y="214" text-anchor="middle" dominant-baseline="central" fill="rgb(15,110,86)" font-size="12">Kërkesa në KQZ dhe marrja e fletëve-tip</text>
</g>
<line x1="205" y1="234" x2="205" y2="268" marker-end="url(#arrow)" fill="none" stroke="rgb(137,135,129)" stroke-width="1.5"/>

<!-- Step 3: y=272, h=88 (3 desc lines) -->
<g>
  <rect x="50" y="272" width="310" height="88" rx="8" fill="rgb(225,245,238)" stroke="rgb(15,110,86)" stroke-width="0.5"/>
  <text x="205" y="290" text-anchor="middle" dominant-baseline="central" fill="rgb(8,80,65)" font-size="14" font-weight="500">3. Mbledhja e firmave</text>
  <text x="205" y="310" text-anchor="middle" dominant-baseline="central" fill="rgb(15,110,86)" font-size="12">Mblidhen 70 000–100 000 firma për të siguruar<tspan x="205" dy="16">të paktën 50 000 firma të vlefshme, pasi KQZ mund</tspan><tspan x="205" dy="16">të shpallë të pavlefshme një pjesë të tyre.</tspan></text>
</g>
<line x1="205" y1="362" x2="205" y2="396" marker-end="url(#arrow)" fill="none" stroke="rgb(137,135,129)" stroke-width="1.5"/>

<!-- Step 4: y=400, h=88 (3 desc lines) -->
<g>
  <rect x="50" y="400" width="310" height="88" rx="8" fill="rgb(238,237,254)" stroke="rgb(83,74,183)" stroke-width="0.5"/>
  <text x="205" y="418" text-anchor="middle" dominant-baseline="central" fill="rgb(60,52,137)" font-size="14" font-weight="500">4. Verifikimi në KQZ</text>
  <text x="205" y="438" text-anchor="middle" dominant-baseline="central" fill="rgb(83,74,183)" font-size="12">KQZ verifokon firmat dhe jep vendim (brenda<tspan x="205" dy="16">90 ditëve) per vënien në lëvizje të juridiksionit</tspan><tspan x="205" dy="16">kushtetues.</tspan></text>
</g>
<line x1="205" y1="490" x2="205" y2="524" marker-end="url(#arrow)" fill="none" stroke="rgb(137,135,129)" stroke-width="1.5"/>

<!-- Step 5: y=528, h=104 (4 desc lines) -->
<g>
  <rect x="50" y="528" width="310" height="104" rx="8" fill="rgb(238,237,254)" stroke="rgb(83,74,183)" stroke-width="0.5"/>
  <text x="205" y="546" text-anchor="middle" dominant-baseline="central" fill="rgb(60,52,137)" font-size="14" font-weight="500">5. Gjykata Kushtetuese</text>
  <text x="205" y="566" text-anchor="middle" dominant-baseline="central" fill="rgb(83,74,183)" font-size="12">Gjykata kontrollon (brenda 60 ditëve) nëse ligji<tspan x="205" dy="16">hyn te kategoritë e ndaluara nga neni 151/2 i</tspan><tspan x="205" dy="16">Kushtetutës. Ligji 21/2024 për zonat e mbrojtura</tspan><tspan x="205" dy="16">nuk bën pjesë në kategoritë e ndaluara.</tspan></text>
</g>
<line x1="205" y1="634" x2="205" y2="668" marker-end="url(#arrow)" fill="none" stroke="rgb(137,135,129)" stroke-width="1.5"/>

<!-- Step 6: y=672, h=72 (2 desc lines) -->
<g>
  <rect x="50" y="672" width="310" height="72" rx="8" fill="rgb(238,237,254)" stroke="rgb(83,74,183)" stroke-width="0.5"/>
  <text x="205" y="690" text-anchor="middle" dominant-baseline="central" fill="rgb(60,52,137)" font-size="14" font-weight="500">6. Dekreti i Presidentit</text>
  <text x="205" y="710" text-anchor="middle" dominant-baseline="central" fill="rgb(83,74,183)" font-size="12">Presidenti cakton datën e referendumit<tspan x="205" dy="16">kombëtar (brenda 45 ditëve).</tspan></text>
</g>
<line x1="205" y1="746" x2="205" y2="780" marker-end="url(#arrow)" fill="none" stroke="rgb(137,135,129)" stroke-width="1.5"/>

<!-- Step 7: y=784, h=104 (4 desc lines) -->
<g>
  <rect x="50" y="784" width="310" height="104" rx="8" fill="rgb(250,236,231)" stroke="rgb(153,60,29)" stroke-width="0.5"/>
  <text x="205" y="802" text-anchor="middle" dominant-baseline="central" fill="rgb(113,43,19)" font-size="14" font-weight="500">7. Fushata dhe votimi</text>
  <text x="205" y="822" text-anchor="middle" dominant-baseline="central" fill="rgb(153,60,29)" font-size="12">Referendum kombëtar! Referendumi administrohet<tspan x="205" dy="16">nga KQZ-ja si çdo proces zgjedhor kombëtar (lista</tspan><tspan x="205" dy="16">zgjedhësish, qendra votimi, vëzhgues, numërim</tspan><tspan x="205" dy="16">dhe shpallje rezultati).</tspan></text>
</g>
<line x1="205" y1="890" x2="205" y2="924" marker-end="url(#arrow)" fill="none" stroke="rgb(137,135,129)" stroke-width="1.5"/>

<!-- Step 8: y=928, h=88 (3 desc lines) -->
<g>
  <rect x="50" y="928" width="310" height="88" rx="8" fill="rgb(250,236,231)" stroke="rgb(153,60,29)" stroke-width="0.5"/>
  <text x="205" y="946" text-anchor="middle" dominant-baseline="central" fill="rgb(113,43,19)" font-size="14" font-weight="500">8. Rezultati</text>
  <text x="205" y="966" text-anchor="middle" dominant-baseline="central" fill="rgb(153,60,29)" font-size="12">Duhet te plotesohen dy kushte: (i) Shumica e<tspan x="205" dy="16">votave PRO shfuqizimit dhe (ii) 1/3 e zgjedhësve</tspan><tspan x="205" dy="16">PRO shfuqizimit</tspan></text>
</g>

<!-- Threshold box, aligned with step 8 -->
<line x1="360" y1="972" x2="410" y2="972" fill="none" stroke="rgb(137,135,129)" stroke-width="0.5" stroke-dasharray="4 3"/>
<g>
  <rect x="410" y="944" width="230" height="56" rx="8" fill="rgb(252,235,235)" stroke="rgb(163,45,45)" stroke-width="0.5"/>
  <text x="525" y="962" text-anchor="middle" dominant-baseline="central" fill="rgb(121,31,31)" font-size="14" font-weight="500">Sa vota duhen?</text>
  <text x="525" y="982" text-anchor="middle" dominant-baseline="central" fill="rgb(163,45,45)" font-size="12">Rreth 1.25 Milion vota PRO shfuqizimit</text>
</g>

<!-- Side panel -->
<rect x="395" y="80" width="245" height="500" rx="8" fill="rgb(252,252,251)" stroke="rgba(11,11,11,0.2)" stroke-width="0.5" stroke-dasharray="4 4"/>
<text x="409" y="108" fill="rgb(11,11,11)" font-size="14" font-weight="500">Dy mësime nga historia</text>
<text x="409" y="136" fill="rgb(82,81,78)" font-size="12">1. Kuvendi mund ta bëjë
  <tspan x="409" dy="17">referendumin të panevojshëm</tspan>
  <tspan x="409" dy="17">(ose ta shmangë). Në rastin e</tspan>
  <tspan x="409" dy="17">vetëm ku procesi shkoi deri në</tspan>
  <tspan x="409" dy="17">fund (2012–2013), Presidenti</tspan>
  <tspan x="409" dy="17">dekretoi datën 22 dhjetor 2013,</tspan>
  <tspan x="409" dy="17">por referendumi nuk u zhvillua,</tspan>
  <tspan x="409" dy="17">pasi më 10.10.2013 Kuvendi</tspan>
  <tspan x="409" dy="17">miratoi vetë ndryshimet në ligj.</tspan>
  <tspan x="409" dy="17">Pra presioni i firmave mund të</tspan>
  <tspan x="409" dy="17">sjellë ndryshim ligjor edhe pa</tspan>
  <tspan x="409" dy="17">votim. (Burimi: ahc.org.al)</tspan>
</text>
<text x="409" y="360" fill="rgb(82,81,78)" font-size="12">2. Rruga e Gjykatës Kushtetuese
  <tspan x="409" dy="17">si kontroll abstrakt tashmë</tspan>
  <tspan x="409" dy="17">është provuar dhe ka dështuar:</tspan>
  <tspan x="409" dy="17">Gjykata rrëzoi kërkesën e 1/5</tspan>
  <tspan x="409" dy="17">së deputetëve për shfuqizimin</tspan>
  <tspan x="409" dy="17">e ligjit nr. 21/2024, duke e lënë</tspan>
  <tspan x="409" dy="17">në fuqi (korrik 2025). Kjo nuk e</tspan>
  <tspan x="409" dy="17">pengon referendumin — janë</tspan>
  <tspan x="409" dy="17">procedura të ndryshme — por</tspan>
  <tspan x="409" dy="17">kujdes: një referendum për të</tspan>
  <tspan x="409" dy="17">njëjtën çështje nuk përsëritet</tspan>
  <tspan x="409" dy="17">para se të kalojnë 3 vjet</tspan>
  <tspan x="409" dy="17">(neni 151/3 i Kushtetutës).</tspan>
</text>
</svg>
